name: Supabase Keepalive

on:
  schedule:
    - cron: '0 8 */5 * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.SB_ANON }}" \
            -H "Authorization: Bearer ${{ secrets.SB_ANON }}" \
            "${{ secrets.SB_URL }}/rest/v1/accounts?select=id&limit=1")
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "Keepalive OK"
          else
            echo "Keepalive FAILED - status $STATUS"
            exit 1
          fi

      - name: Log time
        run: date -u
